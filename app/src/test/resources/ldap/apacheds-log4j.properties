log4j.rootCategory=INFO, stdout, R

log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %p [%c] - %m%n

log4j.appender.R=org.apache.log4j.RollingFileAppender
log4j.appender.R.File=${apacheds.log.dir}/apacheds-rolling.log
log4j.appender.R.MaxFileSize=10MB
log4j.appender.R.MaxBackupIndex=5
log4j.appender.R.layout=org.apache.log4j.PatternLayout
log4j.appender.R.layout.ConversionPattern=[%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}] %p [%c] - %m%n

log4j.logger.org.apache.directory.server=DEBUG
log4j.logger.org.apache.directory.server.ApacheDsService=DEBUG
log4j.logger.org.apache.directory.server.config.builder=DEBUG
log4j.logger.org.apache.directory.server.core=INFO
log4j.logger.org.apache.directory.server.core.DefaultDirectoryService=DEBUG
log4j.logger.org.apache.directory.server.core.partition.ldif=DEBUG
log4j.logger.org.apache.directory.server.ldap=DEBUG
log4j.logger.org.apache.directory.api.ldap=INFO
log4j.logger.org.apache.directory.api.ldap.model.ldif=DEBUG
log4j.logger.org.apache.mina=INFO

log4j.logger.org.ehcache=WARN
log4j.logger.org.apache.directory.api.codec=WARN
log4j.logger.org.apache.directory.api.asn1=WARN
log4j.logger.org.apache.directory.server.schema=WARN
log4j.logger.org.apache.directory.api.ldap.model.schema=WARN
log4j.logger.org.apache.directory.server.core.partition.impl.btree.jdbm.JdbmTable=WARN
log4j.logger.org.apache.directory.server.core.partition.impl.btree.jdbm.JdbmIndex=WARN
log4j.logger.jdbm.recman.BaseRecordManager=WARN
log4j.logger.org.apache.directory.server.core.partition.impl=WARN
